<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Calculateur Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f8fafc; padding: 20px; }
        .box { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 12px; border: 1px solid #e5e7eb; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .btn { padding: 8px 16px; border-radius: 6px; cursor: pointer; border: 1px solid #d1d5db; background: white; font-weight: 500; margin-left: 8px; }
        .btn-new { background: #1f2937; color: white; border: none; }
        .btn-dup { background: #8b5cf6; color: white; border: none; font-weight: 500; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-left: 8px; }
        .btn-del { cursor: pointer; border: none; background: none; }
        .btn-clear { background: #ef4444; color: white; border: none; font-weight: 500; padding: 8px 16px; border-radius: 6px; cursor: pointer; margin-left: 8px; }
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px; }
        .info-block-notes { background: #fffbeb; padding: 15px; border-radius: 8px; border: 2px solid #fcd34d; display: flex; flex-direction: column; }
        .info-block-email { background: #eff6ff; padding: 15px; border-radius: 8px; border: 2px solid #bfdbfe; display: flex; flex-direction: column; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th { text-align: left; padding: 10px; border-bottom: 2px solid #eee; }
        td { padding: 10px; border-bottom: 1px solid #eee; vertical-align: top; }
        textarea { height: 60px; border: 1px solid #ddd; border-radius: 4px; padding: 5px; }
        input { padding: 5px; border: 1px solid #ddd; border-radius: 4px; }
        .no-spin::-webkit-outer-spin-button, .no-spin::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 30px; }
        .stats-comparison { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .stat-card { padding: 20px; border-radius: 8px; text-align: center; font-weight: bold; }
        .sub-stats { display: flex; flex-direction: column; gap: 5px; }
        .gain-green { color: #a3e635; font-weight: 600; }
        .achat-gray { color: #374151; font-weight: 600; }
        .client-orange { color: #f97316; font-weight: 600; }
        .drag-handle { cursor: grab; color: #ccc; margin-right: 10px; font-size: 1.2em; }
        
        @media print {
            * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            @page { size: A4 portrait; margin: 15mm; }
            .btn, .btn-dup, .btn-clear, .btn-del, .top-bar, .add-row-btn, .drag-handle { display: none !important; }
            body { background: white; padding: 0; }
            .box { box-shadow: none !important; border: none !important; width: 100% !important; max-width: 100% !important; margin: 0 !important; padding: 0 !important; }
            table { width: 100% !important; table-layout: auto !important; }
            textarea { border: none !important; resize: none !important; background: transparent !important; height: auto !important; width: 100% !important; padding: 0 !important; font-family: inherit; }
            input { border: none !important; background: transparent !important; width: 100% !important; padding: 0 !important; }
            tr { page-break-inside: avoid; }
        }
    </style>
</head>
<body>
<div class="box">
    <div class="top-bar">
        <select id="proj-sel" onchange="switchP()" style="padding: 8px; border-radius: 6px;"></select>
        <div>
            <button class="btn-dup" onclick="dupP()">Dupliquer</button>
            <button class="btn-clear" onclick="deleteCurrentProject()">Effacer</button>
            <button class="btn" onclick="expCSV()">CSV</button>
            <button class="btn" onclick="window.print()">PDF</button>
            <button class="btn" style="color:#ef4444" onclick="resetP()">Réinitialiser</button>
            <button class="btn btn-new" onclick="addP()">Nouveau</button>
        </div>
    </div>
    <input type="text" id="p-name" onchange="saveName(this.value)" style="font-size:28px; font-weight:800; border:none; margin-bottom:20px; width:100%;">
    <div class="info-grid">
        <div class="info-block-notes"><label>Notes Projet</label><textarea id="p-notes" onchange="saveNotes(this.value)"></textarea></div>
        <div class="info-block-email"><label>E-mail Client</label><input id="p-email" onchange="saveEmail(this.value)"></div>
    </div>
    <table>
        <thead><tr><th></th><th>Dénomination</th><th>Qté</th><th>Unités</th><th>Prix</th><th>Total Achat</th><th>Marge %</th><th>Gain</th><th>Total Client</th><th></th></tr></thead>
        <tbody id="tbody"></tbody>
    </table>
    <button class="btn add-row-btn" style="background:#f97316; color:white; border:none; margin-top:15px;" onclick="addR()">+ Ajouter ligne</button>
    <div class="stats-grid">
        <div class="sub-stats">
            <div class="stat-card" style="background:#8b5cf6; padding:10px; color:white;">m²: <span id="v2">0.00</span></div>
            <div class="stat-card" style="background:#0ea5e9; padding:10px; color:white;">ml: <span id="v5">0.00</span></div>
        </div>
        <div class="stat-card" style="background:#e5e7eb; color:#374151;">TOTAL ACHAT<br><span id="v1">0.00 CHF</span></div>
        <div class="stat-card" style="background:#a3e635; color:#1a2e05;">BÉNÉFICE<br><span id="v3">0.00 CHF</span></div>
        <div class="stat-card" style="background:#f97316; color:white;">TOTAL CLIENT<br><span id="v4">0.00 CHF</span></div>
    </div>
    <div class="stats-comparison">
        <div class="stat-card" style="background:#e9d5ff; color:#581c87;">ACHAT BOIS M²<br><span id="v-achat-m2">0.00 CHF</span></div>
        <div class="stat-card" style="background:#bae6fd; color:#075985;">ACHAT BOIS ML<br><span id="v-achat-ml">0.00 CHF</span></div>
    </div>
</div>

<script>
    let d = JSON.parse(localStorage.getItem('data')) || [{id:1, name:'Nouveau', notes:'', email:'', rows:[]}];
    let cur = d[0].id;
    const mlKeywords = ["chevron", "liteau", "carrelet", "baguette", "moulure", "champlat", "plinthe", "tasseau", "chant thermo-collant", "poutre", "solive", "cimaise", "tablette", "plateau", "planche"];

    function render() {
        const p = d.find(x => x.id == cur);
        if(!p) return;
        document.getElementById('p-name').value = p.name;
        document.getElementById('p-notes').value = p.notes;
        document.getElementById('p-email').value = p.email;
        document.getElementById('proj-sel').innerHTML = d.map(x => `<option value="${x.id}" ${x.id==cur?'selected':''}>${x.name}</option>`).join('');
        
        let tA=0, tG=0, tC=0, tM2=0, tML=0, tA_M2=0, tA_ML=0;
        const tbody = document.getElementById('tbody');
        tbody.innerHTML = '';
        
        p.rows.forEach((r, i) => {
            let isVisserie = /[\d]+[\.,][\d]+x/i.test(r.d);
            let dim = r.d.match(/(\d+)x(\d+)/i);
            let lenMatch = r.d.match(/(\d+[\.,]?\d*)\s*m/i);
            let len = lenMatch ? parseFloat(lenMatch[1].replace(',', '.')) : 1;
            let isM2 = (dim && !isVisserie && !r.d.toLowerCase().includes('ml') && !r.d.toLowerCase().includes('m')); 
            let isML = !isVisserie && (mlKeywords.some(kw => r.d.toLowerCase().includes(kw)) || r.d.toLowerCase().includes('ml'));
            let ach = 0, unit = 'pce';
            if(isM2) { let surf = (parseInt(dim[1])*parseInt(dim[2])/1000000); ach = surf * r.q * r.p; tM2 += (surf * r.q); tA_M2 += ach; unit = 'm²'; } else if(isML) { ach = r.q * r.p; tML += (r.q * len); tA_ML += ach; unit = 'ml'; } else { ach = r.q * r.p; }
            let g = ach * (r.m/100); tA += ach; tG += g; tC += (ach+g);
            
            let row = document.createElement('tr');
            row.setAttribute('data-id', i);
            row.innerHTML = `<td class="drag-handle">⋮⋮</td><td><textarea onchange="up(${i},'d',this.value)" style="width:100%; font-size:0.9em; font-weight:bold; color:#6b7280; border:1px solid #ddd; border-radius:4px; resize:vertical; padding:5px; background:transparent;">${r.d}</textarea></td>
                <td><input type="number" value="${r.q}" onchange="up(${i},'q',this.value)" style="width:50px"></td>
                <td>${unit}</td>
                <td><input type="number" step="0.01" class="no-spin" value="${parseFloat(r.p).toFixed(2)}" onchange="up(${i},'p',this.value)" style="width:80px"></td>
                <td class="achat-gray">${ach.toFixed(2)}</td>
                <td><input type="number" value="${r.m}" onchange="up(${i},'m',this.value)" style="width:50px"></td>
                <td class="gain-green">${g.toFixed(2)}</td>
                <td class="client-orange">${(ach+g).toFixed(2)}</td>
                <td><button class="btn-del" onclick="del(${i})">🗑️</button></td>`;
            tbody.appendChild(row);
            if(isM2) { tbody.innerHTML += `<tr data-id="${i}-sub"><td colspan="10"><div style="color:#8b5cf6; font-size:0.9em; font-weight:bold;">● ${dim[1]}x${dim[2]}mm = ${(parseInt(dim[1])*parseInt(dim[2])/1000000).toFixed(3)} m²/pce</div><div style="color:#ef4444; font-size:0.9em; font-weight:bold;">● Total : ${( (parseInt(dim[1])*parseInt(dim[2])/1000000) * r.q).toFixed(3)} m²</div></td></tr>`; } else if (isML) { tbody.innerHTML += `<tr data-id="${i}-sub"><td colspan="10"><div style="color:#0ea5e9; font-size:0.9em; font-weight:bold;">● ${r.q} x ${len}m = ${(r.q * len).toFixed(2)}m</div><div style="color:#ef4444; font-size:0.9em; font-weight:bold;">● Total : ${(r.q * len).toFixed(2)} ml</div></td></tr>`; }
        });
        document.getElementById('v1').innerText = tA.toFixed(2) + ' CHF'; document.getElementById('v2').innerText = tM2.toFixed(3); document.getElementById('v5').innerText = tML.toFixed(2); document.getElementById('v3').innerText = tG.toFixed(2) + ' CHF'; document.getElementById('v4').innerText = tC.toFixed(2) + ' CHF'; document.getElementById('v-achat-m2').innerText = tA_M2.toFixed(2) + ' CHF'; document.getElementById('v-achat-ml').innerText = tA_ML.toFixed(2) + ' CHF';
    }

    new Sortable(document.getElementById('tbody'), {
        handle: '.drag-handle',
        animation: 150,
        onEnd: function (evt) {
            let p = d.find(x => x.id == cur);
            let rows = p.rows;
            let item = rows.splice(evt.oldIndex / 2, 1)[0];
            rows.splice(evt.newIndex / 2, 0, item);
            save();
        }
    });

    function dupP() { const p = d.find(x => x.id == cur); let newP = JSON.parse(JSON.stringify(p)); newP.id = Date.now(); newP.name = p.name + " (copie)"; d.push(newP); cur = newP.id; save(); }
    function deleteCurrentProject() { if(d.length <= 1) { alert("Vous ne pouvez pas supprimer le dernier projet."); return; } if(confirm('Supprimer ce projet définitivement ?')) { d = d.filter(x => x.id != cur); cur = d[0].id; save(); } }
    function expCSV() { const p = d.find(x => x.id == cur); let csv = "Dénomination,Qté,Unité,Prix,Marge,Total Client\n"; p.rows.forEach(r => csv += `${r.d},${r.q},${r.p},${r.m},${(r.q*r.p)*(1+r.m/100)}\n`); const blob = new Blob([csv], {type: 'text/csv'}); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `${p.name}.csv`; a.click(); }
    function up(i, f, v) { d.find(x => x.id == cur).rows[i][f] = v; save(); }
    function saveName(v) { d.find(x => x.id == cur).name = v; save(); }
    function saveNotes(v) { d.find(x => x.id == cur).notes = v; save(); }
    function saveEmail(v) { d.find(x => x.id == cur).email = v; save(); }
    function save() { localStorage.setItem('data', JSON.stringify(d)); render(); }
    function addR() { d.find(x => x.id == cur).rows.push({d:'', q:1, p:0, m:30}); render(); }
    function addP() { let id=Date.now(); d.push({id, name:'Nouveau', notes:'', email:'', rows:[]}); cur=id; save(); }
    function switchP() { cur = document.getElementById('proj-sel').value; render(); }
    function del(i) { d.find(x => x.id == cur).rows.splice(i, 1); save(); }
    function resetP() { if(confirm('Réinitialiser ce projet uniquement ?')) { let p = d.find(x => x.id == cur); p.rows = []; p.notes = ''; p.email = ''; p.name = 'Nouveau'; save(); } }
    render();
</script>
</body>
</html>
